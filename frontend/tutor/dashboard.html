<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Tuteur - TutorApp</title>
    <link rel="stylesheet" href="../assets/css/style.css">

    <script src="../assets/js/app.js" defer></script>

    <style>
        /* LAYOUT */
        .dashboard {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            background: #0a2540;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 15px 0;
            padding: 10px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #ff7a00;
        }

        /* CONTENT */
        .content {
            padding: 30px;
            background: #f4f6f9;
        }

        /* STATS */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }

        .stat-card h3 {
            font-size: 22px;
            margin-bottom: 10px;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }

        table th, table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        table th {
            background: #0a2540;
            color: white;
        }

        .btn-small {
            padding: 6px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .accept {
            background: green;
            color: white;
        }

        .reject {
            background: red;
            color: white;
        }
    </style>
</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>👨‍🏫 Tuteur</h2>

        <a href="#">📊 Dashboard</a>
        <a href="#">📅 Réservations</a>
        <a href="#">👨‍🎓 Étudiants</a>
        <a href="#">⭐ Avis</a>
        <a href="../index.html" onclick="logout()">🚪 Déconnexion</a>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <h1>Bienvenue Tuteur 👋</h1>
        <p>Gère tes réservations et tes étudiants</p>

        <!-- STATS -->
        <div class="stats">

            <div class="stat-card">
                <h3 id="totalRes">0</h3>
                <p>Réservations</p>
            </div>

            <div class="stat-card">
                <h3>3</h3>
                <p>Étudiants actifs</p>
            </div>

            <div class="stat-card">
                <h3>4.7</h3>
                <p>Note moyenne</p>
            </div>

        </div>

        <!-- TABLE DYNAMIQUE -->
        <h2>📅 Réservations reçues</h2>

        <table id="tutorTable">
            <tr>
                <th>Étudiant</th>
                <th>Matière</th>
                <th>Date</th>
                <th>Heure</th>
                <th>Action</th>
            </tr>
        </table>

    </div>

</div>

</body>
</html>
