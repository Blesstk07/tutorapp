<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Étudiant - TutorApp</title>

    <link rel="stylesheet" href="../assets/css/style.css">
    <script src="../assets/js/app.js" defer></script>

    <style>
        .dashboard {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: #0a2540;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 15px 0;
            padding: 10px;
            border-radius: 6px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #ff7a00;
        }

        .content {
            padding: 30px;
            background: #f4f6f9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }

        .stat-card h3 {
            font-size: 22px;
        }

        table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        }

        th, td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #0a2540;
            color: white;
        }

        .status {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
        }

        .pending { background: orange; color: white; }
        .accepted { background: green; color: white; }
        .rejected { background: red; color: white; }
    </style>
</head>

<body>

<div class="dashboard">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>🎓 Étudiant</h2>

        <a href="#">📊 Dashboard</a>
        <a href="../tutors.html">👨‍🏫 Trouver un tuteur</a>
        <a href="#">📅 Mes réservations</a>
        <a href="../index.html" onclick="logout()">🚪 Déconnexion</a>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <h1>Bienvenue 👋</h1>
        <p>Suivi de tes activités</p>

        <!-- STATS -->
        <div class="stats">

            <div class="stat-card">
                <h3 id="myReservationsCount">0</h3>
                <p>Réservations</p>
            </div>

            <div class="stat-card">
                <h3>--</h3>
                <p>Tuteurs consultés</p>
            </div>

            <div class="stat-card">
                <h3>--</h3>
                <p>Note moyenne</p>
            </div>

        </div>

        <!-- TABLE DYNAMIQUE -->
        <h2>📅 Mes réservations</h2>

        <table id="studentTable">
            <tr>
                <th>Tuteur</th>
                <th>Matière</th>
                <th>Date</th>
                <th>Heure</th>
                <th>Statut</th>
            </tr>
        </table>

    </div>

</div>

</body>
</html>
